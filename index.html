<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denver Concerts 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f0f14;
      color: #e8e8f0;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 28px 32px 20px;
      border-bottom: 1px solid #2a2a4a;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 6px;
    }
    .header-icon { font-size: 2.2rem; }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e040fb, #7c4dff, #40c4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-left: 56px;
    }
    .changelog-link {
      margin-left: 56px;
      margin-top: 8px;
    }
    .changelog-link a {
      color: #7c4dff;
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.15s;
    }
    .changelog-link a:hover {
      color: #e040fb;
      text-decoration: underline;
    }

    /* FILTERS */
    .filters-bar {
      background: #16161f;
      border-bottom: 1px solid #2a2a4a;
      padding: 14px 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      font-weight: 600;
    }
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-chip {
      background: #1e1e2e;
      color: #888;
      border: 1px solid #3a3a5a;
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: #7c4dff; color: #ccc; }
    .filter-chip.active { background: #7c4dff; color: #fff; border-color: #7c4dff; }
    .filter-chip.select-all { font-weight: 700; font-style: italic; }
    .result-count {
      margin-left: auto;
      font-size: 0.82rem;
      color: #888;
      background: #1e1e2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 5px 14px;
    }
    .result-count span { color: #e040fb; font-weight: 700; }

    /* SEARCH */
    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    .search-input {
      width: 100%;
      background: #1e1e2e;
      color: #e8e8f0;
      border: 1px solid #3a3a5a;
      border-radius: 20px;
      padding: 9px 16px 9px 36px;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: #666; }
    .search-input:focus { border-color: #7c4dff; }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 0.9rem;
      pointer-events: none;
    }
    .search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #1e1e2e;
      border: 1px solid #3a3a5a;
      border-radius: 12px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .search-dropdown.open { display: block; }
    .search-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #ccc;
      transition: background 0.1s;
    }
    .search-item:hover, .search-item.highlighted {
      background: #2a2a4a;
      color: #fff;
    }
    .search-item:first-child { border-radius: 12px 12px 0 0; }
    .search-item:last-child { border-radius: 0 0 12px 12px; }
    .search-item .search-date {
      font-size: 0.72rem;
      color: #777;
      margin-left: 8px;
    }

    /* MONTH NAV */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 18px 32px 6px;
    }
    .nav-btn {
      background: #1e1e2e;
      border: 1px solid #3a3a5a;
      color: #e8e8f0;
      width: 38px; height: 38px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-btn:hover { background: #7c4dff; border-color: #7c4dff; }
    .month-label {
      font-size: 1.35rem;
      font-weight: 700;
      min-width: 220px;
      text-align: center;
    }
    .month-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      padding: 8px 32px 16px;
    }
    .month-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2a2a4a;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .month-dot:hover { background: #7c4dff; }
    .month-dot.active { background: #7c4dff; transform: scale(1.4); }
    .month-dot.has-events { background: #3a3a6a; }

    /* CALENDAR GRID */
    .calendar-wrap {
      padding: 0 24px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .cal-header-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }
    .cal-header-day {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      padding: 8px 0;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 185px;
      gap: 4px;
    }
    .cal-cell {
      background: #16161f;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, background 0.15s;
    }
    .cal-cell.has-events { cursor: pointer; }
    .cal-cell.has-events:hover { border-color: #7c4dff; background: #1a1a2a; }
    .cal-cell.empty { background: transparent; border-color: transparent; }
    .cal-cell.today { border-color: #e040fb; }
    .cal-cell.today .day-num { color: #e040fb; font-weight: 700; }
    .day-num {
      font-size: 0.82rem;
      color: #555;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .day-label {
      display: none; /* hidden on desktop — shown on mobile */
      font-size: 0.68rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .event-chip {
      font-size: 0.68rem;
      padding: 3px 6px;
      border-radius: 4px;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
      line-height: 1.4;
    }
    .more-events {
      font-size: 0.65rem;
      color: #777;
      margin-top: auto;
      font-style: italic;
    }

    /* Genre chip colors */
    .genre-hiphop      { background: #3d1a5c; color: #d080ff; border-left: 3px solid #9c27b0; }
    .genre-electronic  { background: #0d2b4a; color: #40c4ff; border-left: 3px solid #0288d1; }
    .genre-rock        { background: #3d1a1a; color: #ff7043; border-left: 3px solid #e64a19; }
    .genre-country     { background: #2e2500; color: #ffd54f; border-left: 3px solid #f9a825; }
    .genre-pop         { background: #1a0d2e; color: #f48fb1; border-left: 3px solid #e91e63; }
    .genre-indie       { background: #0d2e1a; color: #69f0ae; border-left: 3px solid #00897b; }
    .genre-punk        { background: #2e0d0d; color: #ff8a80; border-left: 3px solid #c62828; }
    .genre-jam         { background: #1a2e20; color: #a5d6a7; border-left: 3px solid #388e3c; }
    .genre-metal       { background: #1e1e1e; color: #bdbdbd; border-left: 3px solid #424242; }

    /* LEGEND */
    .legend-wrap {
      padding: 4px 24px 8px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.72rem; color: #888;
      cursor: pointer;
      padding: 3px 8px 3px 5px;
      border-radius: 20px;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .legend-item:hover { border-color: #3a3a5a; color: #ccc; }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
    }
    .legend-swatch {
      width: 16px; height: 12px; border-radius: 3px; flex-shrink: 0;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a2e;
      border: 1px solid #3a3a5a;
      border-radius: 16px;
      max-width: 540px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    }
    .modal-header {
      padding: 20px 24px 14px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0;
      background: #1a1a2e;
      border-radius: 16px 16px 0 0;
      z-index: 1;
    }
    .modal-date { font-size: 1.05rem; font-weight: 700; }
    .modal-close {
      background: #2a2a4a;
      border: none;
      color: #e8e8f0;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: #e040fb; }
    .modal-body { padding: 16px 24px 20px; }
    .modal-event {
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .modal-event:last-child { margin-bottom: 0; }
    .modal-event-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .modal-event-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .ticket-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 7px 16px;
      background: linear-gradient(135deg, #e040fb, #7c4dff);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.03em;
    }
    .ticket-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .ticket-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .spotify-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 7px 16px;
      background: #1db954;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.03em;
    }
    .spotify-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .spotify-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .modal-btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .meta-tag {
      font-size: 0.72rem;
      background: rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 3px 10px;
      color: #aaa;
    }

    /* Empty state */
    .empty-month {
      text-align: center;
      padding: 60px 20px;
      color: #555;
      font-size: 0.95rem;
    }
    .empty-month .emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    /* ── TABLET / SMALL SCREEN (2-column grid) ── */
    @media (max-width: 700px) {
      header {
        padding: 18px 16px 14px;
        position: sticky;
        top: 0;
        z-index: 100;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      }
      h1 { font-size: 1.4rem; }
      .subtitle { margin-left: 0; margin-top: 6px; }
      .changelog-link { margin-left: 0; }
      .filters-bar { padding: 10px 16px; }
      .month-nav {
        position: sticky;
        z-index: 99;
        background: #0f0f14;
        padding-top: 12px;
        padding-bottom: 6px;
      }
      .month-dots {
        position: sticky;
        z-index: 98;
        background: #0f0f14;
        padding-bottom: 10px;
      }
      .legend-wrap {
        position: sticky;
        z-index: 97;
        background: #0f0f14;
        padding-top: 4px;
        padding-bottom: 8px;
        border-bottom: 1px solid #2a2a4a;
      }
      .calendar-wrap, .legend-wrap { padding-left: 8px; padding-right: 8px; }
      select { min-width: 130px; font-size: 0.82rem; }
      .result-count { margin-left: 0; }

      /* Hide the 7-column day-of-week header row — doesn't apply in 2-col */
      .cal-header-row { display: none; }

      /* Switch to 2-column grid with taller rows */
      .cal-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: auto;
        gap: 8px;
      }

      /* Hide empty leading cells */
      .cal-cell.empty { display: none; }

      /* Larger, more readable day tiles */
      .cal-cell {
        padding: 10px 12px;
        min-height: 100px;
        border-radius: 12px;
      }
      .day-num {
        font-size: 0.95rem;
        margin-bottom: 8px;
        color: #888;
      }
      .event-chip {
        font-size: 0.75rem;
        padding: 4px 8px;
        margin-bottom: 4px;
        white-space: normal;
        overflow: visible;
        text-overflow: unset;
        line-height: 1.35;
      }
      .more-events {
        font-size: 0.72rem;
        padding-top: 2px;
      }
      /* Show inline day-of-week label on mobile */
      .day-label { display: inline; margin-right: 6px; }
    }

    /* ── NARROW PHONE (single-column list) ── */
    @media (max-width: 480px) {
      .cal-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .cal-cell {
        padding: 12px 14px;
        min-height: auto;
      }
      .day-num {
        font-size: 1rem;
        font-weight: 700;
      }
      .event-chip {
        font-size: 0.8rem;
        padding: 5px 10px;
        margin-bottom: 5px;
      }
      .month-label { font-size: 1.15rem; min-width: 180px; }
      .legend { gap: 6px; }
      .legend-item { font-size: 0.68rem; padding: 2px 6px 2px 4px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="header-icon">🎸</span>
    <h1>Denver Concerts 2026</h1>
  </div>
  <div class="subtitle">Live music across Denver's greatest venues &mdash; Red Rocks, Ball Arena, Mission Ballroom &amp; more</div>
  <div class="changelog-link"><a href="changelog.html">New shows as of Mar 24, 2026 &rarr;</a></div>
  <div class="search-wrap" style="margin-top:14px;">
    <span class="search-icon">&#128269;</span>
    <input type="text" class="search-input" id="artistSearch" placeholder="Search by artist name..." autocomplete="off">
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
</header>

<div class="filters-bar" style="flex-direction:column;align-items:stretch;">
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <span class="filter-label">Venue</span>
    <div class="filter-chips" id="venueChips"></div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <span class="filter-label">Genre</span>
    <div class="filter-chips" id="genreChips"></div>
  </div>
  <div class="result-count" id="resultCount"><span>0</span> shows</div>
</div>

<div class="month-nav">
  <button class="nav-btn" onclick="prevMonth()" title="Previous month">&#8249;</button>
  <div class="month-label" id="monthLabel"></div>
  <button class="nav-btn" onclick="nextMonth()" title="Next month">&#8250;</button>
</div>
<div class="month-dots" id="monthDots"></div>

<div class="legend-wrap">
  <div class="legend" id="legend"></div>
</div>

<div class="calendar-wrap">
  <div class="cal-header-row">
    <div class="cal-header-day">Sun</div>
    <div class="cal-header-day">Mon</div>
    <div class="cal-header-day">Tue</div>
    <div class="cal-header-day">Wed</div>
    <div class="cal-header-day">Thu</div>
    <div class="cal-header-day">Fri</div>
    <div class="cal-header-day">Sat</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-date" id="modalDate"></div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

  { date: '2026-11-13', name: 'Bahamas', venue: 'Bluebird Theater', genre: 'Indie/Folk', support: '', ticketUrl: 'https://www.axs.com/events/1355585/bahamas-tickets' },
  { date: '2026-11-14', name: 'Mike', venue: 'Red Rocks Amphitheatre', genre: 'Hip-Hop/R&B', support: '', ticketUrl: 'https://www.axs.com/events/1363234/mike-tickets' },
  { date: '2026-11-15', name: 'The Living Tombstone', venue: 'Mission Ballroom', genre: 'Punk', support: '', ticketUrl: 'https://www.axs.com/events/1378832/the-living-tombstone-tickets' },
  { date: '2026-11-15', name: 'Mike', venue: 'Red Rocks Amphitheatre', genre: 'Hip-Hop/R&B', support: '', ticketUrl: 'https://www.axs.com/events/1363237/mike-tickets' },

  { date: '2027-02-18', name: 'Public Image Ltd', venue: 'Gothic Theatre', genre: 'Rock', support: '', ticketUrl: 'https://www.axs.com/events/1363608/public-image-ltd-tickets' }
];

const GENRE_CLASS = {
  'Hip-Hop/R&B':    'genre-hiphop',
  'Electronic/EDM': 'genre-electronic',
  'Rock':           'genre-rock',
  'Country':        'genre-country',
  'Pop':            'genre-pop',
  'Indie/Folk':     'genre-indie',
  'Punk':           'genre-punk',
  'Jazz/Blues':     'genre-jazz',
  'Metal':          'genre-metal',
};

const GENRE_COLOR = {
  'Hip-Hop/R&B':    '#9c27b0',
  'Electronic/EDM': '#0288d1',
  'Rock':           '#e64a19',
  'Country':        '#f9a825',
  'Pop':            '#e91e63',
  'Indie/Folk':     '#00897b',
  'Punk':           '#c62828',
  'Jazz/Blues':     '#388e3c',
  'Metal':          '#424242',
};

const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

// State
let currentMonth = 2; // March = index 2 (0-based)
let currentYear  = 2026;
let filteredConcerts = [...CONCERTS];

const ALL_VENUES = [...new Set(CONCERTS.map(c => c.venue))].sort();
const ALL_GENRES = [...new Set(CONCERTS.map(c => c.genre))].sort();
let selectedVenues = new Set(ALL_VENUES);
let selectedGenres = new Set(ALL_GENRES);

// ── FILTER CHIPS ──────────────────────────────
function renderFilterChips() {
  // Venue chips
  const vc = document.getElementById('venueChips');
  const allVenuesOn = selectedVenues.size === ALL_VENUES.length;
  let vhtml = '<div class="filter-chip select-all' + (allVenuesOn ? ' active' : '') +
    '" onclick="toggleAllVenues()">All</div>';
  ALL_VENUES.forEach(function(v) {
    vhtml += '<div class="filter-chip' + (selectedVenues.has(v) ? ' active' : '') +
      '" onclick="toggleVenue(\'' + v.replace(/'/g, "\\'") + '\')">' + v + '</div>';
  });
  vc.innerHTML = vhtml;

  // Genre chips
  const gc = document.getElementById('genreChips');
  const allGenresOn = selectedGenres.size === ALL_GENRES.length;
  let ghtml = '<div class="filter-chip select-all' + (allGenresOn ? ' active' : '') +
    '" onclick="toggleAllGenres()">All</div>';
  ALL_GENRES.forEach(function(g) {
    ghtml += '<div class="filter-chip' + (selectedGenres.has(g) ? ' active' : '') +
      '" onclick="toggleGenre(\'' + g.replace(/'/g, "\\'") + '\')">' + g + '</div>';
  });
  gc.innerHTML = ghtml;
}

function toggleVenue(v) {
  if (selectedVenues.has(v)) selectedVenues.delete(v);
  else selectedVenues.add(v);
  renderFilterChips();
  applyFilters();
}

function toggleGenre(g) {
  if (selectedGenres.has(g)) selectedGenres.delete(g);
  else selectedGenres.add(g);
  renderFilterChips();
  applyFilters();
}

function toggleAllVenues() {
  if (selectedVenues.size === ALL_VENUES.length) selectedVenues.clear();
  else selectedVenues = new Set(ALL_VENUES);
  renderFilterChips();
  applyFilters();
}

function toggleAllGenres() {
  if (selectedGenres.size === ALL_GENRES.length) selectedGenres.clear();
  else selectedGenres = new Set(ALL_GENRES);
  renderFilterChips();
  applyFilters();
}

// ── FILTER ─────────────────────────────────────
function applyFilters() {
  filteredConcerts = CONCERTS.filter(c => {
    return selectedVenues.has(c.venue) && selectedGenres.has(c.genre);
  });
  document.getElementById('resultCount').innerHTML =
    '<span>' + filteredConcerts.length + '</span> shows';
  renderCalendar();
}

// ── CALENDAR ───────────────────────────────────
function renderCalendar() {
  document.getElementById('monthLabel').textContent =
    MONTHS[currentMonth] + ' ' + currentYear;

  const grid = document.getElementById('calGrid');
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  const today = new Date();
  const todayStr = today.getFullYear() + '-' +
    String(today.getMonth()+1).padStart(2,'0') + '-' +
    String(today.getDate()).padStart(2,'0');

  let html = '';

  // Leading empty cells
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="cal-cell empty"></div>';
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = currentYear + '-' +
      String(currentMonth+1).padStart(2,'0') + '-' +
      String(day).padStart(2,'0');
    const dayEvents = filteredConcerts.filter(c => c.date === dateStr);
    const isToday   = dateStr === todayStr;
    const hasEvents = dayEvents.length > 0;

    let chips = '';
    const maxVisible = 6;
    dayEvents.slice(0, maxVisible).forEach(function(ev) {
      const cls = GENRE_CLASS[ev.genre] || 'genre-rock';
      chips += '<div class="event-chip ' + cls + '">' + ev.name + '</div>';
    });
    if (dayEvents.length > maxVisible) {
      chips += '<div class="more-events">see ' + (dayEvents.length - maxVisible) + ' more</div>';
    }

    var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var dowLabel = dayNames[new Date(currentYear, currentMonth, day).getDay()];
    html += '<div class="cal-cell' +
      (hasEvents ? ' has-events' : '') +
      (isToday   ? ' today'     : '') + '"' +
      (hasEvents ? ' onclick="openModal(\'' + dateStr + '\')"' : '') + '>' +
      '<div class="day-num"><span class="day-label">' + dowLabel + '</span>' + day + '</div>' +
      chips +
      '</div>';
  }

  grid.innerHTML = html;
  renderMonthDots();
}

// ── MONTH DOTS ─────────────────────────────────
function renderMonthDots() {
  let html = '';
  for (let m = 0; m < 12; m++) {
    const hasEvents = filteredConcerts.some(function(c) {
      const d = new Date(c.date);
      return d.getMonth() === m && d.getFullYear() === currentYear;
    });
    html += '<div class="month-dot' +
      (m === currentMonth ? ' active' : '') +
      (hasEvents ? ' has-events' : '') + '"' +
      ' title="' + MONTHS[m] + '"' +
      ' onclick="goToMonth(' + m + ')"></div>';
  }
  document.getElementById('monthDots').innerHTML = html;
}

function goToMonth(m)  { currentMonth = m; renderCalendar(); }
function prevMonth()   { if (currentMonth > 0)  { currentMonth--; renderCalendar(); } }
function nextMonth()   { if (currentMonth < 11) { currentMonth++; renderCalendar(); } }

// ── MODAL ──────────────────────────────────────
function openModal(dateStr) {
  const dayEvents = filteredConcerts.filter(c => c.date === dateStr);
  if (!dayEvents.length) return;

  const parts = dateStr.split('-').map(Number);
  const dateObj = new Date(parts[0], parts[1]-1, parts[2]);
  const formatted = dateObj.toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
  document.getElementById('modalDate').textContent = formatted;

  let body = '';
  dayEvents.forEach(function(ev) {
    const cls = GENRE_CLASS[ev.genre] || 'genre-rock';
    var ticketHtml = ev.ticketUrl
      ? '<a class="ticket-btn" href="' + ev.ticketUrl + '" target="_blank" rel="noopener">' +
        '<svg viewBox="0 0 24 24"><path d="M22 10V6a2 2 0 00-2-2H4a2 2 0 00-2 2v4a2 2 0 010 4v4a2 2 0 002 2h16a2 2 0 002-2v-4a2 2 0 010-4zm-2-1.46a4 4 0 000 6.92V18H4v-2.54a4 4 0 000-6.92V6h16v2.54z"/></svg>' +
        'Buy Tickets</a>' : '';
    var spotifyHtml = '<a class="spotify-btn" href="https://open.spotify.com/search/' + encodeURIComponent(ev.name) + '" target="_blank" rel="noopener">' +
      '<svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>' +
      'Spotify</a>';
    var btnRow = (ticketHtml || spotifyHtml) ? '<div class="modal-btn-row">' + ticketHtml + spotifyHtml + '</div>' : '';
    body += '<div class="modal-event ' + cls + '">' +
      '<div class="modal-event-name">' + ev.name + '</div>' +
      '<div class="modal-event-meta">' +
      '<span class="meta-tag">&#128205; ' + ev.venue + '</span>' +
      '<span class="meta-tag">&#127926; ' + ev.genre + '</span>' +
      (ev.support ? '<span class="meta-tag">w/ ' + ev.support + '</span>' : '') +
      '</div>' + btnRow + '</div>';
  });
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal()        { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e){ if (e.target === document.getElementById('modalOverlay')) closeModal(); }

// ── LEGEND ─────────────────────────────────────
function renderLegend() {
  const genres = [...new Set(CONCERTS.map(c => c.genre))].sort();
  document.getElementById('legend').innerHTML = genres.map(function(g) {
    const cls = GENRE_CLASS[g] || 'genre-rock';
    return '<div class="legend-item" onclick="filterByGenre(\'' + g + '\')">' +
      '<div class="legend-swatch ' + cls + '"></div>' +
      g + '</div>';
  }).join('');
}

function filterByGenre(g) {
  toggleGenre(g);
}

// ── ARTIST SEARCH ─────────────────────────────
(function() {
  const input = document.getElementById('artistSearch');
  const dropdown = document.getElementById('searchDropdown');
  let highlightIdx = -1;
  let currentMatches = [];

  // Build unique artist list with their dates
  function getMatches(query) {
    if (!query || query.length < 2) return [];
    const q = query.toLowerCase();
    const seen = new Set();
    const results = [];
    CONCERTS.forEach(function(c) {
      if (c.name.toLowerCase().includes(q)) {
        const key = c.name.toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          results.push({ name: c.name });
        }
      }
    });
    return results.slice(0, 10);
  }

  function renderDropdown() {
    if (!currentMatches.length) {
      dropdown.classList.remove('open');
      return;
    }
    dropdown.innerHTML = currentMatches.map(function(m, i) {
      return '<div class="search-item' + (i === highlightIdx ? ' highlighted' : '') +
        '" data-idx="' + i + '">' + m.name + '</div>';
    }).join('');
    dropdown.classList.add('open');
  }

  function selectArtist(name) {
    // Find all concerts for this artist and open the modal for the first matching date
    const matches = CONCERTS.filter(function(c) {
      return c.name.toLowerCase() === name.toLowerCase();
    });
    if (!matches.length) return;

    // Navigate to that month and open the day modal
    const parts = matches[0].date.split('-').map(Number);
    currentMonth = parts[1] - 1;
    currentYear = parts[0];
    renderCalendar();
    openModal(matches[0].date);

    // Clear search
    input.value = '';
    dropdown.classList.remove('open');
    currentMatches = [];
    highlightIdx = -1;
  }

  input.addEventListener('input', function() {
    highlightIdx = -1;
    currentMatches = getMatches(input.value.trim());
    renderDropdown();
  });

  input.addEventListener('keydown', function(e) {
    if (!currentMatches.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      highlightIdx = Math.min(highlightIdx + 1, currentMatches.length - 1);
      renderDropdown();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      highlightIdx = Math.max(highlightIdx - 1, 0);
      renderDropdown();
    } else if (e.key === 'Enter' && highlightIdx >= 0) {
      e.preventDefault();
      selectArtist(currentMatches[highlightIdx].name);
    } else if (e.key === 'Escape') {
      dropdown.classList.remove('open');
      input.blur();
    }
  });

  dropdown.addEventListener('click', function(e) {
    const item = e.target.closest('.search-item');
    if (!item) return;
    const idx = parseInt(item.dataset.idx);
    selectArtist(currentMatches[idx].name);
  });

  // Close dropdown when clicking outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-wrap')) {
      dropdown.classList.remove('open');
    }
  });
})();

// ── KEYBOARD ───────────────────────────────────
document.addEventListener('keydown', function(e) {
  // Don't trigger nav keys when search input is focused
  if (document.activeElement === document.getElementById('artistSearch')) return;
  if (e.key === 'Escape')      closeModal();
  if (e.key === 'ArrowLeft')   prevMonth();
  if (e.key === 'ArrowRight')  nextMonth();
});

// ── STICKY OFFSETS (mobile) ─────────────────────
function updateStickyOffsets() {
  if (window.innerWidth > 700) return;
  var header = document.querySelector('header');
  var monthNav = document.querySelector('.month-nav');
  var monthDots = document.querySelector('.month-dots');
  var legendWrap = document.querySelector('.legend-wrap');
  var top = header.offsetHeight;
  monthNav.style.top = top + 'px';
  top += monthNav.offsetHeight;
  monthDots.style.top = top + 'px';
  top += monthDots.offsetHeight;
  legendWrap.style.top = top + 'px';
}
window.addEventListener('resize', updateStickyOffsets);
window.addEventListener('load', updateStickyOffsets);

// ── INIT ───────────────────────────────────────
renderFilterChips();
renderLegend();
applyFilters();
updateStickyOffsets();
</script>
