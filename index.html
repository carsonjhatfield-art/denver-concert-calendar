<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denver Concerts 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f0f14;
      color: #e8e8f0;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 28px 32px 20px;
      border-bottom: 1px solid #2a2a4a;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 6px;
    }
    .header-icon { font-size: 2.2rem; }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e040fb, #7c4dff, #40c4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-left: 56px;
    }

    /* FILTERS */
    .filters-bar {
      background: #16161f;
      border-bottom: 1px solid #2a2a4a;
      padding: 14px 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      font-weight: 600;
    }
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-chip {
      background: #1e1e2e;
      color: #888;
      border: 1px solid #3a3a5a;
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: #7c4dff; color: #ccc; }
    .filter-chip.active { background: #7c4dff; color: #fff; border-color: #7c4dff; }
    .filter-chip.select-all { font-weight: 700; font-style: italic; }
    .result-count {
      margin-left: auto;
      font-size: 0.82rem;
      color: #888;
      background: #1e1e2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 5px 14px;
    }
    .result-count span { color: #e040fb; font-weight: 700; }

    /* SEARCH */
    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    .search-input {
      width: 100%;
      background: #1e1e2e;
      color: #e8e8f0;
      border: 1px solid #3a3a5a;
      border-radius: 20px;
      padding: 9px 16px 9px 36px;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: #666; }
    .search-input:focus { border-color: #7c4dff; }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 0.9rem;
      pointer-events: none;
    }
    .search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #1e1e2e;
      border: 1px solid #3a3a5a;
      border-radius: 12px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .search-dropdown.open { display: block; }
    .search-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #ccc;
      transition: background 0.1s;
    }
    .search-item:hover, .search-item.highlighted {
      background: #2a2a4a;
      color: #fff;
    }
    .search-item:first-child { border-radius: 12px 12px 0 0; }
    .search-item:last-child { border-radius: 0 0 12px 12px; }
    .search-item .search-date {
      font-size: 0.72rem;
      color: #777;
      margin-left: 8px;
    }

    /* MONTH NAV */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 18px 32px 6px;
    }
    .nav-btn {
      background: #1e1e2e;
      border: 1px solid #3a3a5a;
      color: #e8e8f0;
      width: 38px; height: 38px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-btn:hover { background: #7c4dff; border-color: #7c4dff; }
    .month-label {
      font-size: 1.35rem;
      font-weight: 700;
      min-width: 220px;
      text-align: center;
    }
    .month-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      padding: 8px 32px 16px;
    }
    .month-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2a2a4a;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .month-dot:hover { background: #7c4dff; }
    .month-dot.active { background: #7c4dff; transform: scale(1.4); }
    .month-dot.has-events { background: #3a3a6a; }

    /* CALENDAR GRID */
    .calendar-wrap {
      padding: 0 24px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .cal-header-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }
    .cal-header-day {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      padding: 8px 0;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 185px;
      gap: 4px;
    }
    .cal-cell {
      background: #16161f;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, background 0.15s;
    }
    .cal-cell.has-events { cursor: pointer; }
    .cal-cell.has-events:hover { border-color: #7c4dff; background: #1a1a2a; }
    .cal-cell.empty { background: transparent; border-color: transparent; }
    .cal-cell.today { border-color: #e040fb; }
    .cal-cell.today .day-num { color: #e040fb; font-weight: 700; }
    .day-num {
      font-size: 0.82rem;
      color: #555;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .day-label {
      display: none;
      font-size: 0.68rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .event-chip {
      font-size: 0.68rem;
      padding: 3px 6px;
      border-radius: 4px;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
      line-height: 1.4;
    }
    .more-events {
      font-size: 0.65rem;
      color: #777;
      margin-top: auto;
      font-style: italic;
    }

    /* Genre chip colors */
    .genre-hiphop      { background: #3d1a5c; color: #d080ff; border-left: 3px solid #9c27b0; }
    .genre-electronic  { background: #0d2b4a; color: #40c4ff; border-left: 3px solid #0288d1; }
    .genre-rock        { background: #3d1a1a; color: #ff7043; border-left: 3px solid #e64a19; }
    .genre-country     { background: #2e2500; color: #ffd54f; border-left: 3px solid #f9a825; }
    .genre-pop         { background: #1a0d2e; color: #f48fb1; border-left: 3px solid #e91e63; }
    .genre-indie       { background: #0d2e1a; color: #69f0ae; border-left: 3px solid #00897b; }
    .genre-punk        { background: #2e0d0d; color: #ff8a80; border-left: 3px solid #c62828; }
    .genre-jam         { background: #1a2e20; color: #a5d6a7; border-left: 3px solid #388e3c; }
    .genre-metal       { background: #1e1e1e; color: #bdbdbd; border-left: 3px solid #424242; }

    /* LEGEND */
    .legend-wrap {
      padding: 4px 24px 8px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.72rem; color: #888;
      cursor: pointer;
      padding: 3px 8px 3px 5px;
      border-radius: 20px;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .legend-item:hover { border-color: #3a3a5a; color: #ccc; }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
    }
    .legend-swatch {
      width: 16px; height: 12px; border-radius: 3px; flex-shrink: 0;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a2e;
      border: 1px solid #3a3a5a;
      border-radius: 16px;
      max-width: 540px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    }
    .modal-header {
      padding: 20px 24px 14px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0;
      background: #1a1a2e;
      border-radius: 16px 16px 0 0;
      z-index: 1;
    }
    .modal-date { font-size: 1.05rem; font-weight: 700; }
    .modal-close {
      background: #2a2a4a;
      border: none;
      color: #e8e8f0;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: #e040fb; }
    .modal-body { padding: 16px 24px 20px; }
    .modal-event {
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .modal-event:last-child { margin-bottom: 0; }
    .modal-event-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .modal-event-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .ticket-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 7px 16px;
      background: linear-gradient(135deg, #e040fb, #7c4dff);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.03em;
    }
    .ticket-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .ticket-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .meta-tag {
      font-size: 0.72rem;
      background: rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 3px 10px;
      color: #aaa;
    }

    /* Empty state */
    .empty-month {
      text-align: center;
      padding: 60px 20px;
      color: #555;
      font-size: 0.95rem;
    }
    .empty-month .emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    /* PICKS TOOLBAR */
    .picks-bar {
      background: #12121a;
      border-bottom: 1px solid #2a2a4a;
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .shared-list-banner {
      font-size: 0.85rem;
      color: #e040fb;
      font-weight: 600;
      padding: 2px 10px;
      border-right: 1px solid #2a2a4a;
      margin-right: 4px;
    }
    .picks-count {
      font-size: 0.82rem;
      color: #aaa;
    }
    .picks-count span { color: #e040fb; font-weight: 700; }
    .picks-toggle-btn {
      background: #1e1e2e;
      color: #888;
      border: 1px solid #3a3a5a;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .picks-toggle-btn:hover { border-color: #e040fb; color: #ccc; }
    .picks-toggle-btn.active { background: #e040fb; color: #fff; border-color: #e040fb; }
    .picks-share-btn {
      background: linear-gradient(135deg, #e040fb, #7c4dff);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      display: none;
    }
    .picks-share-btn:hover { opacity: 0.85; }
    .picks-share-btn.visible { display: inline-flex; align-items: center; gap: 6px; }
    .picks-signin {
      margin-left: auto;
      font-size: 0.78rem;
      color: #ccc;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1e1e2e;
      border: 1px solid #3a3a5a;
      border-radius: 20px;
      padding: 6px 16px 6px 10px;
    }
    .picks-signin:hover { border-color: #7c4dff; background: #252538; }
    .picks-signin .google-logo {
      width: 16px; height: 16px; flex-shrink: 0;
    }
    .picks-signin.signed-in {
      color: #69f0ae;
      cursor: default;
      border-color: rgba(105,240,174,0.3);
      background: rgba(105,240,174,0.06);
    }
    .picks-signin.signed-in:hover { border-color: rgba(105,240,174,0.3); background: rgba(105,240,174,0.06); }
    .picks-status {
      font-size: 0.72rem;
      color: #555;
      margin-left: 8px;
    }

    /* HEART TOGGLE IN MODAL */
    .pick-heart {
      background: rgba(255,255,255,0.06);
      border: 1px solid #3a3a5a;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.82rem;
      padding: 6px 14px;
      transition: all 0.2s;
      line-height: 1;
      float: right;
      color: #888;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
    }
    .pick-heart:hover {
      border-color: #e040fb;
      background: rgba(224,64,251,0.08);
      color: #e040fb;
    }
    .pick-heart.picked {
      background: rgba(224,64,251,0.15);
      border-color: #e040fb;
      color: #e040fb;
      animation: heartPop 0.3s ease;
    }
    .pick-heart .heart-icon { font-size: 1.1rem; line-height: 1; }
    @keyframes heartPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    /* HEART ON CALENDAR CHIPS */
    .event-chip.is-pick { position: relative; }
    .event-chip.is-pick::after {
      content: '\2665';
      margin-left: 4px;
      font-size: 0.6rem;
      color: #e040fb;
    }

    /* SHARE MODAL */
    .share-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .share-overlay.open { display: flex; }
    .share-modal {
      background: #1a1a2e;
      border: 1px solid #3a3a5a;
      border-radius: 16px;
      max-width: 420px;
      width: 100%;
      padding: 24px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
      text-align: center;
    }
    .share-modal h3 {
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: #e8e8f0;
    }
    .share-url-box {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .share-url-input {
      flex: 1;
      background: #0f0f14;
      color: #e8e8f0;
      border: 1px solid #3a3a5a;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.85rem;
      outline: none;
    }
    .share-copy-btn {
      background: linear-gradient(135deg, #e040fb, #7c4dff);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .share-copy-btn:hover { opacity: 0.85; }
    .share-close-btn {
      margin-top: 16px;
      background: #2a2a4a;
      border: none;
      color: #aaa;
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .share-close-btn:hover { color: #fff; }

    /* ── TABLET / SMALL SCREEN (2-column grid) ── */
    @media (max-width: 700px) {
      /* Sticky: header, month nav, month dots, genre legend */
      header {
        padding: 18px 16px 14px;
        position: sticky;
        top: 0;
        z-index: 100;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      }
      h1 { font-size: 1.4rem; }
      .subtitle { margin-left: 0; margin-top: 6px; }
      /* Filters/search scroll away — NOT sticky */
      .filters-bar { padding: 10px 16px; }
      .picks-bar { padding: 10px 16px; }
      .month-nav {
        position: sticky;
        z-index: 99;
        background: #0f0f14;
        padding-top: 12px;
        padding-bottom: 6px;
      }
      .month-dots {
        position: sticky;
        z-index: 98;
        background: #0f0f14;
        padding-bottom: 10px;
      }
      .legend-wrap {
        position: sticky;
        z-index: 97;
        background: #0f0f14;
        padding-top: 4px;
        padding-bottom: 8px;
        border-bottom: 1px solid #2a2a4a;
      }
      .calendar-wrap, .legend-wrap { padding-left: 8px; padding-right: 8px; }
      select { min-width: 130px; font-size: 0.82rem; }
      .result-count { margin-left: 0; }
      .picks-signin { margin-left: 0; }

      /* Hide 7-column day-of-week header row */
      .cal-header-row { display: none; }

      /* 2-column grid with auto-height rows */
      .cal-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: auto;
        gap: 8px;
      }

      /* Hide empty leading/trailing cells */
      .cal-cell.empty { display: none; }

      /* Larger, more readable day tiles */
      .cal-cell {
        padding: 10px 12px;
        min-height: 100px;
        border-radius: 12px;
      }
      .day-num {
        font-size: 0.95rem;
        margin-bottom: 8px;
        color: #888;
      }
      /* Event chips wrap text instead of truncating */
      .event-chip {
        font-size: 0.75rem;
        padding: 4px 8px;
        margin-bottom: 4px;
        white-space: normal;
        overflow: visible;
        text-overflow: unset;
        line-height: 1.35;
      }
      .more-events {
        font-size: 0.72rem;
        padding-top: 2px;
      }
      /* Show inline day-of-week label (e.g. "Mon") on mobile */
      .day-label { display: inline; margin-right: 6px; }
    }

    /* ── NARROW PHONE (single-column list) ── */
    @media (max-width: 480px) {
      .cal-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .cal-cell {
        padding: 12px 14px;
        min-height: auto;
      }
      .day-num {
        font-size: 1rem;
        font-weight: 700;
      }
      .event-chip {
        font-size: 0.8rem;
        padding: 5px 10px;
        margin-bottom: 5px;
      }
      .month-label { font-size: 1.15rem; min-width: 180px; }
      .legend { gap: 6px; }
      .legend-item { font-size: 0.68rem; padding: 2px 6px 2px 4px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="header-icon">🎸</span>
    <h1>Denver Concerts 2026</h1>
  </div>
  <div class="subtitle">Live music across Denver's greatest venues &mdash; Red Rocks, Ball Arena, Mission Ballroom &amp; more</div>
  <div class="search-wrap" style="margin-top:14px;">
    <span class="search-icon">&#128269;</span>
    <input type="text" class="search-input" id="artistSearch" placeholder="Search by artist name..." autocomplete="off">
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
</header>

<div class="filters-bar" style="flex-direction:column;align-items:stretch;">
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <span class="filter-label">Venue</span>
    <div class="filter-chips" id="venueChips"></div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <span class="filter-label">Genre</span>
    <div class="filter-chips" id="genreChips"></div>
  </div>
  <div class="result-count" id="resultCount"><span>0</span> shows</div>
</div>

<!-- Picks Toolbar -->
<div class="picks-bar" id="picksBar">
  <span class="shared-list-banner" id="sharedListBanner" style="display:none;"></span>

// State
let currentMonth = new Date().getMonth(); // 0-based, auto from today's date
let currentYear  = new Date().getFullYear();
let filteredConcerts = [...CONCERTS];

const ALL_VENUES = [...new Set(CONCERTS.map(c => c.venue))].sort();
const ALL_GENRES = [...new Set(CONCERTS.map(c => c.genre))].sort();
let selectedVenues = new Set(ALL_VENUES);
let selectedGenres = new Set(ALL_GENRES);

// ── FILTER CHIPS ──────────────────────────────
function renderFilterChips() {
  // Venue chips
  const vc = document.getElementById('venueChips');
  const allVenuesOn = selectedVenues.size === ALL_VENUES.length;
  let vhtml = '<div class="filter-chip select-all' + (allVenuesOn ? ' active' : '') +
    '" onclick="toggleAllVenues()">All</div>';
  ALL_VENUES.forEach(function(v) {
    vhtml += '<div class="filter-chip' + (selectedVenues.has(v) ? ' active' : '') +
      '" onclick="toggleVenue(\'' + v.replace(/'/g, "\\'") + '\')">' + v + '</div>';
  });
  vc.innerHTML = vhtml;

  // Genre chips
  const gc = document.getElementById('genreChips');
  const allGenresOn = selectedGenres.size === ALL_GENRES.length;
  let ghtml = '<div class="filter-chip select-all' + (allGenresOn ? ' active' : '') +
    '" onclick="toggleAllGenres()">All</div>';
  ALL_GENRES.forEach(function(g) {
    ghtml += '<div class="filter-chip' + (selectedGenres.has(g) ? ' active' : '') +
      '" onclick="toggleGenre(\'' + g.replace(/'/g, "\\'") + '\')">' + g + '</div>';
  });
  gc.innerHTML = ghtml;
}

function toggleVenue(v) {
  if (selectedVenues.has(v)) selectedVenues.delete(v);
  else selectedVenues.add(v);
  renderFilterChips();
  applyFilters();
}

function toggleGenre(g) {
  if (selectedGenres.has(g)) selectedGenres.delete(g);
  else selectedGenres.add(g);
  renderFilterChips();
  applyFilters();
}

function toggleAllVenues() {
  if (selectedVenues.size === ALL_VENUES.length) selectedVenues.clear();
  else selectedVenues = new Set(ALL_VENUES);
  renderFilterChips();
  applyFilters();
}

function toggleAllGenres() {
  if (selectedGenres.size === ALL_GENRES.length) selectedGenres.clear();
  else selectedGenres = new Set(ALL_GENRES);
  renderFilterChips();
  applyFilters();
}

// ── FILTER ─────────────────────────────────────
function applyFilters() {
  filteredConcerts = CONCERTS.filter(function(c) {
    if (!selectedVenues.has(c.venue) || !selectedGenres.has(c.genre)) return false;
    if (showOnlyPicks && !myPicks.has(c.id)) return false;
    return true;
  });
  document.getElementById('resultCount').innerHTML =
    '<span>' + filteredConcerts.length + '</span> shows';
  renderCalendar();
}

// ── CALENDAR ───────────────────────────────────
function renderCalendar() {
  document.getElementById('monthLabel').textContent =
    MONTHS[currentMonth] + ' ' + currentYear;

  const grid = document.getElementById('calGrid');
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  const today = new Date();
  const todayStr = today.getFullYear() + '-' +
    String(today.getMonth()+1).padStart(2,'0') + '-' +
    String(today.getDate()).padStart(2,'0');

  let html = '';

  // Leading empty cells
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="cal-cell empty"></div>';
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = currentYear + '-' +
      String(currentMonth+1).padStart(2,'0') + '-' +
      String(day).padStart(2,'0');
    const dayEvents = filteredConcerts.filter(c => c.date === dateStr)
      .sort(function(a, b) {
        var aPick = myPicks.has(a.id) ? 0 : 1;
        var bPick = myPicks.has(b.id) ? 0 : 1;
        return aPick - bPick;
      });
    const isToday   = dateStr === todayStr;
    const hasEvents = dayEvents.length > 0;

    let chips = '';
    const maxVisible = 6;
    dayEvents.slice(0, maxVisible).forEach(function(ev) {
      const cls = GENRE_CLASS[ev.genre] || 'genre-rock';
      const isPick = myPicks.has(ev.id) ? ' is-pick' : '';
      chips += '<div class="event-chip ' + cls + isPick + '">' + ev.name + '</div>';
    });
    if (dayEvents.length > maxVisible) {
      chips += '<div class="more-events">see ' + (dayEvents.length - maxVisible) + ' more</div>';
    }

    var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var dowLabel = dayNames[new Date(currentYear, currentMonth, day).getDay()];
    html += '<div class="cal-cell' +
      (hasEvents ? ' has-events' : '') +
      (isToday   ? ' today'     : '') + '"' +
      (hasEvents ? ' onclick="openModal(\'' + dateStr + '\')"' : '') + '>' +
      '<div class="day-num"><span class="day-label">' + dowLabel + '</span>' + day + '</div>' +
      chips +
      '</div>';
  }

  grid.innerHTML = html;
  renderMonthDots();
}

// ── MONTH DOTS ─────────────────────────────────
function renderMonthDots() {
  let html = '';
  for (let m = 0; m < 12; m++) {
    const hasEvents = filteredConcerts.some(function(c) {
      const d = new Date(c.date);
      return d.getMonth() === m && d.getFullYear() === currentYear;
    });
    html += '<div class="month-dot' +
      (m === currentMonth ? ' active' : '') +
      (hasEvents ? ' has-events' : '') + '"' +
      ' title="' + MONTHS[m] + '"' +
      ' onclick="goToMonth(' + m + ')"></div>';
  }
  document.getElementById('monthDots').innerHTML = html;
}

function goToMonth(m)  { currentMonth = m; renderCalendar(); }
function prevMonth()   { if (currentMonth > 0)  { currentMonth--; renderCalendar(); } }
function nextMonth()   { if (currentMonth < 11) { currentMonth++; renderCalendar(); } }

// ── MODAL ──────────────────────────────────────
function openModal(dateStr) {
  const dayEvents = filteredConcerts.filter(c => c.date === dateStr)
    .sort(function(a, b) {
      var aPick = myPicks.has(a.id) ? 0 : 1;
      var bPick = myPicks.has(b.id) ? 0 : 1;
      return aPick - bPick;
    });
  if (!dayEvents.length) return;

  const parts = dateStr.split('-').map(Number);
  const dateObj = new Date(parts[0], parts[1]-1, parts[2]);
  const formatted = dateObj.toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
  document.getElementById('modalDate').textContent = formatted;

  let body = '';
  dayEvents.forEach(function(ev) {
    const cls = GENRE_CLASS[ev.genre] || 'genre-rock';
    var isPicked = myPicks.has(ev.id);
    var heartHtml = '<button class="pick-heart' + (isPicked ? ' picked' : '') +
      '" onclick="event.stopPropagation(); togglePick(\'' + ev.id + '\')" title="' +
      (isPicked ? 'Remove from my concerts' : 'Add to my concerts') + '">' +
      '<span class="heart-icon">' + (isPicked ? '&#10084;&#65039;' : '&#9825;') + '</span> ' +
      (isPicked ? 'Saved' : 'Save') + '</button>';
    var ticketHtml = ev.ticketUrl
      ? '<a class="ticket-btn" href="' + ev.ticketUrl + '" target="_blank" rel="noopener">' +
        '<svg viewBox="0 0 24 24"><path d="M22 10V6a2 2 0 00-2-2H4a2 2 0 00-2 2v4a2 2 0 010 4v4a2 2 0 002 2h16a2 2 0 002-2v-4a2 2 0 010-4zm-2-1.46a4 4 0 000 6.92V18H4v-2.54a4 4 0 000-6.92V6h16v2.54z"/></svg>' +
        'Buy Tickets</a>' : '';
    body += '<div class="modal-event ' + cls + '">' +
      heartHtml +
      '<div class="modal-event-name">' + ev.name + '</div>' +
      '<div class="modal-event-meta">' +
      '<span class="meta-tag">&#128205; ' + ev.venue + '</span>' +
      '<span class="meta-tag">&#127926; ' + ev.genre + '</span>' +
      (ev.support ? '<span class="meta-tag">w/ ' + ev.support + '</span>' : '') +
      '</div>' + ticketHtml + '</div>';
  });
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal()        { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e){ if (e.target === document.getElementById('modalOverlay')) closeModal(); }

// ── LEGEND ─────────────────────────────────────
function renderLegend() {
  const genres = [...new Set(CONCERTS.map(c => c.genre))].sort();
  document.getElementById('legend').innerHTML = genres.map(function(g) {
    const cls = GENRE_CLASS[g] || 'genre-rock';
    return '<div class="legend-item" onclick="filterByGenre(\'' + g + '\')">' +
      '<div class="legend-swatch ' + cls + '"></div>' +
      g + '</div>';
  }).join('');
}

function filterByGenre(g) {
  toggleGenre(g);
}

// ── ARTIST SEARCH ─────────────────────────────
(function() {
  const input = document.getElementById('artistSearch');
  const dropdown = document.getElementById('searchDropdown');
  let highlightIdx = -1;
  let currentMatches = [];

  // Build unique artist list with their dates
  function getMatches(query) {
    if (!query || query.length < 2) return [];
    const q = query.toLowerCase();
    const seen = new Set();
    const results = [];
    CONCERTS.forEach(function(c) {
      if (c.name.toLowerCase().includes(q)) {
        const key = c.name.toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          results.push({ name: c.name });
        }
      }
    });
    return results.slice(0, 10);
  }

  function renderDropdown() {
    if (!currentMatches.length) {
      dropdown.classList.remove('open');
      return;
    }
    dropdown.innerHTML = currentMatches.map(function(m, i) {
      return '<div class="search-item' + (i === highlightIdx ? ' highlighted' : '') +
        '" data-idx="' + i + '">' + m.name + '</div>';
    }).join('');
    dropdown.classList.add('open');
  }

  function selectArtist(name) {
    // Find all concerts for this artist and open the modal for the first matching date
    const matches = CONCERTS.filter(function(c) {
      return c.name.toLowerCase() === name.toLowerCase();
    });
    if (!matches.length) return;

    // Navigate to that month and open the day modal
    const parts = matches[0].date.split('-').map(Number);
    currentMonth = parts[1] - 1;
    currentYear = parts[0];
    renderCalendar();
    openModal(matches[0].date);

    // Clear search
    input.value = '';
    dropdown.classList.remove('open');
    currentMatches = [];
    highlightIdx = -1;
  }

  input.addEventListener('input', function() {
    highlightIdx = -1;
    currentMatches = getMatches(input.value.trim());
    renderDropdown();
  });

  input.addEventListener('keydown', function(e) {
    if (!currentMatches.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      highlightIdx = Math.min(highlightIdx + 1, currentMatches.length - 1);
      renderDropdown();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      highlightIdx = Math.max(highlightIdx - 1, 0);
      renderDropdown();
    } else if (e.key === 'Enter' && highlightIdx >= 0) {
      e.preventDefault();
      selectArtist(currentMatches[highlightIdx].name);
    } else if (e.key === 'Escape') {
      dropdown.classList.remove('open');
      input.blur();
    }
  });

  dropdown.addEventListener('click', function(e) {
    const item = e.target.closest('.search-item');
    if (!item) return;
    const idx = parseInt(item.dataset.idx);
    selectArtist(currentMatches[idx].name);
  });

  // Close dropdown when clicking outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-wrap')) {
      dropdown.classList.remove('open');
    }
  });
})();

// ── KEYBOARD ───────────────────────────────────
document.addEventListener('keydown', function(e) {
  // Don't trigger nav keys when search input is focused
  if (document.activeElement === document.getElementById('artistSearch')) return;
  if (e.key === 'Escape')      closeModal();
  if (e.key === 'ArrowLeft')   prevMonth();
  if (e.key === 'ArrowRight')  nextMonth();
});

// ── PICKS STATE ───────────────────────────────
let myPicks = new Set();
let showOnlyPicks = false;
let picksDocId = null;
let picksLoaded = false;
let isSaving = false;
let listOwnerName = null;  // set when viewing someone else's shared list

function initPicks() {
  const params = new URLSearchParams(window.location.search);
  const listCode = params.get('list');
  if (listCode) {
    loadPicksFromFirestore(listCode);
  } else {
    try {
      const saved = localStorage.getItem('dcc_picks');
      if (saved) {
        const parsed = JSON.parse(saved);
        myPicks = new Set(parsed.picks || []);
        picksDocId = parsed.docId || null;
      }
    } catch(e) {}
    picksLoaded = true;
    updatePicksUI();
  }
}

function loadPicksFromFirestore(docId) {
  setPicksStatus('Loading list...');
  db.collection('lists').doc(docId).get()
    .then(function(doc) {
      if (doc.exists) {
        var data = doc.data();
        myPicks = new Set(data.picks || []);
        picksDocId = docId;
        // Check if this is someone else's shared list
        var currentUid = auth.currentUser ? auth.currentUser.uid : null;
        if (data.ownerId && data.ownerId !== currentUid) {
          listOwnerName = data.ownerName || 'Someone';
        }
        // Backfill ownerName if owner loads their own list and it's missing
        if (data.ownerId && data.ownerId === currentUid && !data.ownerName && auth.currentUser.displayName) {
          db.collection('lists').doc(docId).update({ ownerName: auth.currentUser.displayName });
        }
        savePicksToLocal();
        setPicksStatus('');
      } else {
        setPicksStatus('List not found');
      }
      picksLoaded = true;
      updatePicksUI();
    })
    .catch(function(err) {
      console.error('Error loading list:', err);
      setPicksStatus('Error loading list');
      picksLoaded = true;
      updatePicksUI();
    });
}

function togglePick(concertId) {
  if (myPicks.has(concertId)) myPicks.delete(concertId);
  else myPicks.add(concertId);
  updatePicksUI();
  savePicksToLocal();
  debounceSaveToFirestore();
  var openDate = findOpenModalDate();
  if (openDate) openModal(openDate);
}

function findOpenModalDate() {
  var overlay = document.getElementById('modalOverlay');
  if (!overlay.classList.contains('open')) return null;
  var text = document.getElementById('modalDate').textContent;
  try {
    var d = new Date(text);
    if (isNaN(d)) return null;
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  } catch(e) { return null; }
}

function updatePicksUI() {
  var count = myPicks.size;
  document.getElementById('picksCount').innerHTML =
    '<span>' + count + '</span> concert' + (count !== 1 ? 's' : '');
  // Show/hide shared list banner
  var banner = document.getElementById('sharedListBanner');
  if (listOwnerName) {
    banner.textContent = listOwnerName + '\'s Concert List';
    banner.style.display = '';
  } else {
    banner.style.display = 'none';
  }
  var shareBtn = document.getElementById('picksShareBtn');
  if (count > 0) shareBtn.classList.add('visible');
  else shareBtn.classList.remove('visible');
  var toggleBtn = document.getElementById('picksToggle');
  var whose = listOwnerName ? listOwnerName + '\'s' : 'my';
  if (showOnlyPicks) {
    toggleBtn.classList.add('active');
    toggleBtn.innerHTML = '&#9829; Showing ' + whose + ' concerts';
  } else {
    toggleBtn.classList.remove('active');
    toggleBtn.innerHTML = '&#9829; Show only ' + whose + ' concerts';
  }
  if (picksLoaded) renderCalendar();
}

function togglePicksFilter() {
  showOnlyPicks = !showOnlyPicks;
  updatePicksUI();
  applyFilters();
}

function setPicksStatus(msg) {
  document.getElementById('picksStatus').textContent = msg;
}

function savePicksToLocal() {
  try {
    localStorage.setItem('dcc_picks', JSON.stringify({
      picks: [...myPicks], docId: picksDocId
    }));
  } catch(e) {}
}

var saveTimeout = null;
function debounceSaveToFirestore() {
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(savePicksToFirestore, 1500);
}

function savePicksToFirestore() {
  if (isSaving) return;
  var picksArray = [...myPicks];
  if (picksArray.length === 0 && !picksDocId) return;
  isSaving = true;
  setPicksStatus('Saving...');
  var authPromise = auth.currentUser
    ? Promise.resolve(auth.currentUser)
    : auth.signInAnonymously().then(function(cred) { return cred.user; });
  authPromise.then(function(user) {
    if (picksDocId) {
      var updateData = {
        picks: picksArray,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      if (user.displayName) updateData.ownerName = user.displayName;
      return db.collection('lists').doc(picksDocId).update(updateData)
        .then(function() { return picksDocId; });
    } else {
      var newId = generateListCode();
      return db.collection('lists').doc(newId).set({
        picks: picksArray,
        ownerId: user.uid,
        ownerName: user.displayName || 'Someone',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        picksDocId = newId;
        savePicksToLocal();
        return newId;
      });
    }
  }).then(function() {
    isSaving = false;
    setPicksStatus('Saved');
    setTimeout(function() { setPicksStatus(''); }, 2000);
  }).catch(function(err) {
    isSaving = false;
    console.error('Error saving picks:', err);
    setPicksStatus('Save failed');
    setTimeout(function() { setPicksStatus(''); }, 3000);
  });
}

function generateListCode() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  var code = '';
  for (var i = 0; i < 6; i++) {
    code += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return code;
}

function openShareModal() {
  if (!picksDocId && myPicks.size > 0) {
    savePicksToFirestore();
    setTimeout(openShareModal, 2000);
    setPicksStatus('Saving before sharing...');
    return;
  }
  if (!picksDocId) return;
  var baseUrl = window.location.origin + window.location.pathname;
  var shareUrl = baseUrl + '?list=' + picksDocId;
  document.getElementById('shareUrlInput').value = shareUrl;
  document.getElementById('shareOverlay').classList.add('open');
}

function closeShareModal() {
  document.getElementById('shareOverlay').classList.remove('open');
}

function closeShareOutside(e) {
  if (e.target === document.getElementById('shareOverlay')) closeShareModal();
}

function copyShareUrl() {
  var input = document.getElementById('shareUrlInput');
  input.select();
  navigator.clipboard.writeText(input.value).then(function() {
    document.getElementById('shareCopyBtn').textContent = 'Copied!';
    setTimeout(function() {
      document.getElementById('shareCopyBtn').textContent = 'Copy';
    }, 2000);
  });
}

function handleSignIn() {
  var user = auth.currentUser;
  if (user && !user.isAnonymous) return;
  var provider = new firebase.auth.GoogleAuthProvider();
  if (user && user.isAnonymous) {
    user.linkWithPopup(provider)
      .then(function(result) {
        updateSignInUI(result.user);
        setPicksStatus('Account linked!');
        if (listOwnerName) {
          // Viewing someone else's shared list — create the user's own copy
          createOwnListFromShared(result.user);
        } else if (picksDocId) {
          db.collection('lists').doc(picksDocId).update({
            ownerId: result.user.uid,
            ownerName: result.user.displayName || 'Someone'
          });
        }
        setTimeout(function() { setPicksStatus(''); }, 2000);
      })
      .catch(function(err) {
        if (err.code === 'auth/credential-already-in-use') {
          handleMerge(err.credential);
        } else {
          console.error('Link error:', err);
          setPicksStatus('Sign-in failed');
          setTimeout(function() { setPicksStatus(''); }, 3000);
        }
      });
  } else {
    auth.signInWithPopup(provider)
      .then(function(result) {
        updateSignInUI(result.user);
        if (listOwnerName) {
          createOwnListFromShared(result.user);
        } else {
          loadExistingUserList(result.user.uid);
        }
      })
      .catch(function(err) {
        console.error('Sign-in error:', err);
        setPicksStatus('Sign-in failed');
        setTimeout(function() { setPicksStatus(''); }, 3000);
      });
  }
}

function handleMerge(credential) {
  auth.signInWithCredential(credential)
    .then(function(result) {
      updateSignInUI(result.user);
      if (listOwnerName) {
        createOwnListFromShared(result.user);
      } else {
        loadExistingUserList(result.user.uid);
      }
    })
    .catch(function(err) { console.error('Merge error:', err); });
}

function loadExistingUserList(uid) {
  db.collection('lists').where('ownerId', '==', uid).limit(1).get()
    .then(function(snapshot) {
      if (!snapshot.empty) {
        var doc = snapshot.docs[0];
        var existingPicks = new Set(doc.data().picks || []);
        myPicks.forEach(function(id) { existingPicks.add(id); });
        myPicks = existingPicks;
        picksDocId = doc.id;
        savePicksToLocal();
        updatePicksUI();
        debounceSaveToFirestore();
      }
    });
}

function createOwnListFromShared(user) {
  // Check if this user already has their own list
  db.collection('lists').where('ownerId', '==', user.uid).limit(1).get()
    .then(function(snapshot) {
      if (!snapshot.empty) {
        // Merge shared picks into their existing list
        var doc = snapshot.docs[0];
        var existingPicks = new Set(doc.data().picks || []);
        myPicks.forEach(function(id) { existingPicks.add(id); });
        myPicks = existingPicks;
        picksDocId = doc.id;
      } else {
        // Create a brand new list with the shared picks
        var newId = generateListCode();
        picksDocId = newId;
        db.collection('lists').doc(newId).set({
          picks: [...myPicks],
          ownerId: user.uid,
          ownerName: user.displayName || 'Someone',
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      // Clear shared list state — this is now the user's own list
      listOwnerName = null;
      // Update URL to remove the shared ?list= parameter
      var cleanUrl = window.location.origin + window.location.pathname;
      window.history.replaceState({}, '', cleanUrl);
      savePicksToLocal();
      updatePicksUI();
      debounceSaveToFirestore();
      setPicksStatus('Saved to your list!');
      setTimeout(function() { setPicksStatus(''); }, 2000);
    });
}

function updateSignInUI(user) {
  var el = document.getElementById('picksSignin');
  var label = document.getElementById('signinLabel');
  var logo = document.getElementById('googleLogo');
  if (user && !user.isAnonymous) {
    el.classList.add('signed-in');
    label.textContent = user.displayName || user.email || 'Signed in';
    el.onclick = null;
    if (logo) logo.style.display = '';
  } else {
    el.classList.remove('signed-in');
    label.textContent = 'Sign in to save across devices';
    el.onclick = handleSignIn;
    if (logo) logo.style.display = '';
  }
}

auth.onAuthStateChanged(function(user) {
  if (user) updateSignInUI(user);
});

// ── STICKY HEADER OFFSETS (mobile only) ────────
function updateStickyOffsets() {
  if (window.innerWidth > 700) return;
  var header = document.querySelector('header');
  var monthNav = document.querySelector('.month-nav');
  var monthDots = document.querySelector('.month-dots');
  var legendWrap = document.querySelector('.legend-wrap');
  var top = header.offsetHeight;
  monthNav.style.top = top + 'px';
  top += monthNav.offsetHeight;
  monthDots.style.top = top + 'px';
  top += monthDots.offsetHeight;
  legendWrap.style.top = top + 'px';
}
window.addEventListener('resize', updateStickyOffsets);
window.addEventListener('load', updateStickyOffsets);

// ── INIT ───────────────────────────────────────
renderFilterChips();
renderLegend();
applyFilters();
initPicks();
updateStickyOffsets();
</script>
