function renderChangelog() {
  const container = document.getElementById('changelogContent');
  const filterBar = document.getElementById('filterBar');

  if (!CHANGELOG_DATA.length) return;

  // Get unique venues
  const venues = [...new Set(CHANGELOG_DATA.map(c => c.venue))].sort();

  // Render filter chips
  filterBar.innerHTML = '<span class="filter-chip active" onclick="filterVenue(\'all\')">All</span>' +
    venues.map(v => '<span class="filter-chip" onclick="filterVenue(\'' + v.replace(/'/g, "\\'") + '\')">' + v + '</span>').join('');

  renderEntries(CHANGELOG_DATA);
}

function filterVenue(venue) {
  const chips = document.querySelectorAll('.filter-chip');
  chips.forEach(c => c.classList.remove('active'));
  if (venue === 'all') {
    chips[0].classList.add('active');
    renderEntries(CHANGELOG_DATA);
  } else {
    const filtered = CHANGELOG_DATA.filter(c => c.venue === venue);
    chips.forEach(c => { if (c.textContent === venue) c.classList.add('active'); });
    renderEntries(filtered);
  }
}

function renderEntries(data) {
  const container = document.getElementById('changelogContent');

  // Group by venue
  const grouped = {};
  data.forEach(entry => {
    if (!grouped[entry.venue]) grouped[entry.venue] = [];
    grouped[entry.venue].push(entry);
  });

  // Sort entries within each venue by concert date
  Object.keys(grouped).forEach(v => {
    grouped[v].sort((a, b) => a.concertDate.localeCompare(b.concertDate));
  });

  const venuesSorted = Object.keys(grouped).sort();

  if (!venuesSorted.length) {
    container.innerHTML = '<p class="empty-state">No changes match the current filter.</p>';
    return;
  }

  container.innerHTML = venuesSorted.map(venue => {
    const entries = grouped[venue];
    return '<div class="venue-section">' +
      '<div class="venue-header"><span>' + venue + '</span><span class="count">' + entries.length + ' change' + (entries.length !== 1 ? 's' : '') + '</span></div>' +
      entries.map(e =>
        '<div class="change-entry">' +
          '<span class="change-date">' + e.concertDate + '</span>' +
          '<span class="change-type ' + e.type + '">' + e.type.toUpperCase() + '</span>' +
          '<div class="change-detail">' +
            '<div class="change-artist">' + e.artist + '</div>' +
            (e.detail ? '<div class="change-meta">' + e.detail + '</div>' : '') +
          '</div>' +
        '</div>'
      ).join('') +
      '<div class="scrape-stamp">Last scraped: ' + entries[entries.length - 1].scrapeDate + '</div>' +
    '</div>';
  }).join('');
}

renderChangelog();
